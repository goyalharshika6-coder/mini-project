version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: skillpath_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillpath_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # These variables can be overridden by a local .env file
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/skillpath-ai
    # env_file:
    #   - ./server/.env
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: skillpath_client
    restart: unless-stopped
    ports:
      - "3000:80" # Map to port 3000 on host
    depends_on:
      - server

volumes:
  mongodb_data:
